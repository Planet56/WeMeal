<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Brûlée | WeMeal</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍🍳</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    @property --glow-angle {
      syntax: "<angle>";
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes glow-spin {
      to {
        --glow-angle: 360deg;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #080d1c;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    /* Sober light mode */
    @media (prefers-color-scheme: light) {
      body {
        background: #f0f2f7;
        color: #1e293b;
      }

      .error-card {
        background: rgba(255, 255, 255, 0.85);
        border-color: rgba(0, 0, 0, 0.06);
      }

      .error-card::before {
        opacity: 0.25;
      }

      .error-subtitle {
        color: #475569;
      }

      .error-hint {
        color: #94a3b8;
      }
    }

    .error-card {
      text-align: center;
      padding: 60px 40px;
      max-width: 480px;
      width: 100%;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(30px);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .error-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      background: conic-gradient(from var(--glow-angle), #6366f1, #8b5cf6, #06b6d4, #6366f1);
      border-radius: 33px;
      opacity: 0.4;
      z-index: -1;
      animation: glow-spin 4s linear infinite;
    }

    .error-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 20px;
      animation: gentle-float 3s ease-in-out infinite;
    }

    @keyframes gentle-float {

      0%,
      100% {
        transform: translateY(0) rotate(-3deg);
      }

      50% {
        transform: translateY(-12px) rotate(3deg);
      }
    }

    .error-code {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .error-subtitle {
      color: #94a3b8;
      font-size: 1rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .error-hint {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 16px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
    }

    .error-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.5);
    }

    .error-btn:active {
      transform: translateY(0);
    }
  </style>
</head>

<body>
  <div class="error-card">
    <span class="error-emoji">🍳🔥</span>
    <div class="error-code">404</div>
    <h1 class="error-title">Page brûlée !</h1>
    <p class="error-subtitle">
      Cette recette a été un peu trop cuite...<br>
      La page que vous cherchez n'existe pas.
    </p>
    <p class="error-hint">Peut-être que l'URL a changé ou que la page a été retirée du menu.</p>
    <a href="index.html" class="error-btn">
      🏠 Retour à l'accueil
    </a>
  </div>
</body>

</html>
